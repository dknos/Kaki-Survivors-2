<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Kitty Kaki Survivors — WebGPU standard-scene probe</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #f9f3df;
      background: #070b18;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #scene-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #probe-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 2;
      max-width: min(520px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid rgba(176, 222, 255, 0.38);
      border-radius: 8px;
      background: rgba(5, 9, 22, 0.84);
      box-shadow: 0 12px 42px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    #probe-title {
      margin: 0 0 7px;
      color: #f7c86a;
      font: 700 13px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #probe-status,
    #probe-details {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.45;
    }

    #probe-status[data-state="error"] { color: #ff9e9e; }
    #probe-status[data-state="ready"] { color: #9cf0c6; }
    #probe-details { margin-top: 5px; color: rgba(236, 244, 255, 0.76); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/build/three.webgpu.js",
      "three/webgpu": "./vendor/three/build/three.webgpu.js",
      "three/tsl": "./vendor/three/build/three.tsl.js",
      "three/addons/": "./vendor/three/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="scene-canvas" aria-label="WebGPU renderer migration standard scene"></canvas>
  <section id="probe-panel" aria-live="polite">
    <h1 id="probe-title">Renderer migration standard scene</h1>
    <p id="probe-status" data-state="loading">Initializing renderer…</p>
    <p id="probe-details">The production game entrypoint is not loaded by this page.</p>
  </section>
  <script type="module" src="./src/qa/webgpuStandardScene.js"></script>
</body>
</html>
