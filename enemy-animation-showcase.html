<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kaki Survivors — Forest Animation QA</title>
  <link rel="icon" href="data:,">
  <style>
    html, body, canvas { width: 100%; height: 100%; margin: 0; display: block; }
    body { overflow: hidden; background: #162315; color: #fff4d5; font: 600 13px/1.2 system-ui, sans-serif; }
    canvas { position: fixed; inset: 0; }
    #title { position: fixed; top: 12px; left: 18px; font-size: 20px; letter-spacing: .08em; text-shadow: 0 2px 3px #000; }
    #backend { position: fixed; top: 16px; right: 18px; color: #ffd070; text-transform: uppercase; }
    #columns { position: fixed; top: 50px; left: 7.5%; right: 1.5%; display: grid; grid-template-columns: repeat(10, 1fr); text-align: center; font-size: 11px; color: #ffe5a4; text-shadow: 0 2px 3px #000; }
    #rows { position: fixed; top: 3%; bottom: 10.25%; left: 12px; display: grid; grid-template-rows: repeat(10, 1fr); align-items: center; text-transform: uppercase; color: #fff0bd; text-shadow: 0 2px 3px #000; }
    #legend { position: fixed; left: 18px; bottom: 10px; color: #cfe0b5; font-weight: 500; text-shadow: 0 2px 3px #000; }
    body.dense #columns, body.dense #rows { display: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/build/three.webgpu.js",
      "three/webgpu": "./vendor/three/build/three.webgpu.js",
      "three/tsl": "./vendor/three/build/three.tsl.js",
      "three/addons/": "./vendor/three/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="qa-canvas"></canvas>
  <div id="title">FOREST ENEMY ANIMATION QA</div>
  <div id="backend">booting</div>
  <div id="columns">
    <span>V1 BEFORE<br>LOCKSTEP</span><span>HALF SPEED</span><span>TOWARD</span><span>RIGHT</span><span>AWAY</span><span>LEFT + FLIP</span><span>ATTACK</span><span>HIT</span><span>DEATH</span><span>PHASE VARIATION</span>
  </div>
  <div id="rows">
    <span>ant</span><span>beetle</span><span>ladybug</span><span>grasshopper</span><span>cockroach</span><span>mantis</span><span>wasp</span><span>bee</span><span>butterfly</span><span>caterpillar</span>
  </div>
  <div id="legend">One shared instance pool per atlas page · no glow · deterministic stepping</div>
  <script type="module" src="./src/qa/enemyAnimationShowcase.js"></script>
</body>
</html>
