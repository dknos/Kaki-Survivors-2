<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Kitty Kaki Survivors — WebGPU post-processing smoke scene</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #f9f3df;
      background: #03050d;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #postfx-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #probe-panel {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 2;
      max-width: min(680px, calc(100vw - 28px));
      padding: 10px 12px;
      border: 1px solid rgba(164, 222, 255, 0.38);
      border-radius: 8px;
      background: rgba(4, 8, 20, 0.88);
      box-shadow: 0 12px 42px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    #probe-title {
      margin: 0 0 5px;
      color: #f6c966;
      font: 700 13px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #probe-status,
    #probe-details {
      margin: 0;
      white-space: pre-wrap;
      font-size: 11px;
      line-height: 1.42;
    }

    #probe-status[data-state="ready"] { color: #98efc2; }
    #probe-status[data-state="error"] { color: #ff9b9b; }
    #probe-details { margin-top: 4px; color: rgba(235, 244, 255, 0.74); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/build/three.webgpu.js",
      "three/webgpu": "./vendor/three/build/three.webgpu.js",
      "three/tsl": "./vendor/three/build/three.tsl.js",
      "three/addons/": "./vendor/three/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="postfx-canvas" aria-label="WebGPU selective bloom validation scene"></canvas>
  <section id="probe-panel" aria-live="polite">
    <h1 id="probe-title">RenderPipeline selective bloom smoke</h1>
    <p id="probe-status" data-state="loading">Initializing renderer…</p>
    <p id="probe-details">The production game entrypoint is not loaded by this page.</p>
  </section>
  <script type="module" src="./src/qa/webgpuPostfxScene.js"></script>
</body>
</html>
