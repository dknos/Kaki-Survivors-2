  <style>
    /* Iter 10a — font-scale CSS var consumed by .kk-fs-* buckets in ui.js */
    /* Iter 21c — narrow-viewport defaults so modals don't overflow on phones.
       Inline _applyFontScale() at :root.style overrides this when a saved
       slider value is present, so the player's option always wins. */
    :root {
      --kk-font-scale: 1;
      --kk-hud-ink: #171018;
      --kk-hud-surface: rgba(31, 20, 29, 0.86);
      --kk-hud-surface-strong: rgba(20, 14, 21, 0.94);
      --kk-hud-line: rgba(255, 226, 188, 0.30);
      --kk-hud-line-soft: rgba(255, 255, 255, 0.08);
      --kk-hud-cream: #fff0dc;
      --kk-hud-muted: rgba(255, 240, 220, 0.64);
      --kk-hud-honey: #ffd18b;
      --kk-hud-mint: #82e7c4;
      --kk-hud-violet: #d89cff;
      --kk-hud-coral: #ff8f78;
      --kk-hud-shadow: 0 14px 34px rgba(14, 7, 12, 0.46);
    }
    @media (max-width: 768px) { :root { --kk-font-scale: 0.85; } }
    @media (max-width: 480px) { :root { --kk-font-scale: 0.70; } }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; }
    /* Aspect-capped stage. The game world + every fixed-position UI overlay
       live inside #kk-stage, which JS sizes to a centred max-16:9 box (see
       main.js#computeStage). On wider-than-16:9 displays (e.g. 32:9 ultrawide)
       the body's black background shows through as letterbox bars. The
       `transform` on the stage is load-bearing: it makes `position:fixed`
       descendants resolve relative to the stage box instead of the viewport,
       so all the existing fixed overlays letterbox for free — no per-overlay
       edits. (2D minigame canvases append to <body> directly, so they stay
       full-viewport — a separate, lower-priority surface.) */
    #kk-stage { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); overflow: hidden; }
    #game-canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
    #ui-root { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
    #ui-root > * { pointer-events: auto; }
    /* The HUD is a fullscreen passthrough layer, NOT an interactive panel — its
       own children (hp bar, buttons) opt back in with pointer-events:auto. Without
       this override the `#ui-root > *` rule above makes the fullscreen .kk-hud eat
       every canvas click, which silently breaks home-decorate placement. */
    #ui-root > .kk-hud { pointer-events: none; }
  </style>
